version: '3.8'

services:
  mysql:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskforge
    ports:
      - '3306:3306'

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - '27017:27017'

  redis:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'

  zookeeper:
    image: wurstmeister/zookeeper:3.4.6
    ports:
      - '2181:2181'

  kafka:
    image: wurstmeister/kafka:latest
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_ZOOKEEPER: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT

  go_app:
    build: ./go_app
    depends_on:
      - mysql
      - mongodb
      - redis
    ports:
      - '8080:8080'
